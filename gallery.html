<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shizhao (Lawrence) Liu — Gallery</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&display=swap');

        :root {
            --bg: #fafafa;
            --text-main: #111111;
            --text-muted: #737373;
            --accent: #000000;
            --border: #eaeaea;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            font-size: 13.5px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 800px;
            margin: 100px auto;
            padding: 0 40px;
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 30px;
        }

        /* Sidebar / Navigation */
        header {
            position: sticky;
            top: 100px;
            height: fit-content;
        }

        .profile-pic {
            width: 170px;
            height: 170px;
            border-radius: 16px;
            object-fit: cover;
            margin-bottom: 20px;
            filter: grayscale(100%);
            transition: filter 0.3s ease;
        }
        
        .profile-pic:hover {
            filter: grayscale(0%);
        }

        h1 {
            font-family: 'Newsreader', serif;
            font-weight: 400;
            font-size: 17px;
            margin: 0 0 4px 0;
            letter-spacing: -0.02em;
            max-width: 170px;
            white-space: nowrap;
        }

        .title {
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 32px;
            font-weight: 300;
        }

        nav a {
            display: block;
            color: var(--text-muted);
            text-decoration: none;
            margin-bottom: 12px;
            transition: color 0.2s ease;
        }

        nav a:hover, nav a.active {
            color: var(--text-main);
        }

        .bottom-links {
            margin-top: 60px; 
            font-size: 12px; 
            color: var(--text-muted);
        }

        .bottom-links a {
            color: inherit;
            text-decoration: none;
            transition: color 0.2s;
        }

        .bottom-links a:hover {
            color: var(--text-main);
        }

        /* Main Content - Gallery */
        h2 {
            font-family: 'Newsreader', serif;
            font-weight: 400;
            font-size: 18px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
            margin-bottom: 24px;
            margin-top: 0;
        }

        p {
            margin-bottom: 30px;
            color: #333;
        }

        /* Masonry Grid Layout */
        .gallery-grid {
            column-count: 2;
            column-gap: 20px;
            margin-bottom: 60px;
        }

        .gallery-item {
            position: relative;
            background-color: #f0f0f0;
            border-radius: 4px;
            overflow: hidden;
            cursor: pointer;
            margin-bottom: 20px;
            display: inline-block;
            width: 100%;
        }

        /* Remove the fixed aspect ratio and color filters */
        .gallery-item img {
            width: 100%;
            display: block; /* Removes bottom space under image */
            transition: transform 0.5s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.03);
        }

        .photo-caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 15px;
            background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 100%);
            color: white;
            font-size: 11px;
            font-family: 'Inter', sans-serif;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .gallery-item:hover .photo-caption {
            opacity: 1;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                margin: 60px auto;
                gap: 40px;
            }
            header {
                position: relative;
                top: 0;
            }
            .profile-pic {
                width: 100px;
                height: 100px;
            }
            h1 {
                max-width: 100px;
            }
            .gallery-grid {
                grid-template-columns: 1fr; /* Single column on mobile */
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <img src="profile.jpg" alt="Shizhao (Lawrence) Liu" class="profile-pic">
        
        <h1>Shizhao (Lawrence) Liu</h1>
        <div class="title">HCI Researcher</div>
        
        <nav>
            <a href="index.html">About</a>
            <a href="index.html#selected-works">Publications</a>
            <a href="cv.html">CV</a>
            <a href="gallery.html" class="active">Gallery</a>
        </nav>
        
        <div class="bottom-links">
            <a href="https://www.linkedin.com/in/shizhaolawrenceliu" target="_blank">LinkedIn</a><br>
            <a href="mailto:sliu12@scu.edu">Email</a>
        </div>
    </header>

    <main>
        <section id="gallery">
            <h2>Film Photography</h2>
            <p>Outside of my research, I shoot analog film. Here is a curated selection of my recent work.</p>
            
            <h3 style="font-family: 'Newsreader', serif; font-weight: 400; font-size: 13.5px; margin-top: 40px; margin-bottom: 20px;">Mexico City (CDMX)</h3>
            <div class="gallery-grid">
                <div class="gallery-item">
                    <img src="photos/cdmx/cdmx_01.JPG" alt="Mexico City 1">
                </div>
                <div class="gallery-item">
                    <img src="photos/cdmx/cdmx_02.JPG" alt="Mexico City 2">
                </div>
                <div class="gallery-item">
                    <img src="photos/cdmx/cdmx_03.JPG" alt="Mexico City 3">
                </div>
                <div class="gallery-item">
                    <img src="photos/cdmx/cdmx_04.JPG" alt="Mexico City 4">
                </div>
                <div class="gallery-item">
                    <img src="photos/cdmx/cdmx_05.JPG" alt="Mexico City 5">
                </div>
            </div>
        </section>
    </main>
</div>

</body>
</html>
